<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automated Face Recognition Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient bg-primary shadow">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <i class="fas fa-calendar-check me-2"></i>
          <span class="fw-bold">Face Attendance</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"><i class="fas fa-home me-1"></i> Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register"><i class="fas fa-user-plus me-1"></i> Register</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/train"><i class="fas fa-sync-alt me-1"></i> Train</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/attendance"><i class="fas fa-qrcode me-1"></i> Attendance</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt me-1"></i> Dashboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 py-4 bg-light text-center text-muted border-top">
      <div class="container">
        <p class="mb-0">© 2025 Automated Face Recognition Attendance System</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/camera.js"></script>
  </body>
</html>
