{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12">
    <div class="card shadow border-0">
      <div class="card-header bg-success text-white text-center py-4">
        <h3 class="mb-0">
          <i class="fas fa-camera me-2"></i>Capture Photos for Roll: <strong>{{ roll }}</strong>
        </h3>
      </div>
      <div class="card-body p-4">
        <div class="row">
          <!-- Camera section -->
          <div class="col-lg-7 mb-4 mb-lg-0">
            <div class="text-center mb-3">
              <h5 class="fw-bold"><i class="fas fa-video me-2"></i>Live Camera Feed</h5>
            </div>

            <div class="position-relative text-center">
              <video id="video" autoplay playsinline class="w-100 rounded shadow" style="max-height: 400px;"></video>
              <div class="camera-overlay position-absolute top-0 start-0 w-100 h-100 rounded"
                style="border: 3px dashed rgba(255,255,255,0.5);"></div>
            </div>

            <div class="d-grid gap-2 mt-3">
              <button id="snap" class="btn btn-success btn-lg">
                <i class="fas fa-camera me-2"></i>Capture & Upload
              </button>
            </div>

            <div class="d-flex gap-2 mt-3 justify-content-center">
              <a href="/train" class="btn btn-primary">
                <i class="fas fa-sync-alt me-1"></i>Train Model
              </a>
              <a href="/" class="btn btn-outline-secondary">
                <i class="fas fa-home me-1"></i>Home
              </a>
            </div>
          </div>

          <!-- Captured Images -->
          <div class="col-lg-5">
            <div id="capture-header" class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="fw-bold"><i class="fas fa-images me-2"></i>Captured Images</h5>
              <span class="badge bg-primary">Captured: <span id="capture-counter">0</span></span>
            </div>
            <div id="captures" class="d-flex flex-wrap gap-3 justify-content-center p-3 bg-light rounded"></div>
            <div class="text-center mt-3">
              <p class="text-muted mb-0">
                <i class="fas fa-info-circle me-1"></i>Take multiple photos for better recognition accuracy
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Include camera.js -->
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
  const roll = "{{ roll }}";
  initCamera(roll);
</script>
{% endblock %}
