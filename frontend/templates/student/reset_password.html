{% extends 'base.html' %}

{% block title %}Reset Password - Student{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card shadow-lg border-0 animated">
        <div class="card-header text-center bg-success text-white">
          <div class="mb-2">
            <i class="fas fa-lock-open fa-3x"></i>
          </div>
          <h4 class="mb-0">Reset Password</h4>
          <p class="mb-0 opacity-75 small">Create a new password for your account</p>
        </div>

        <div class="card-body p-4">
          {% if error %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}

          <form method="POST" id="resetPasswordForm" onsubmit="return validateForm()">
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="fas fa-user me-2 text-primary"></i>Student Name
              </label>
              <input type="text" class="form-control" value="{{ student.name }}" readonly>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="fas fa-key me-2 text-primary"></i>New Password
              </label>
              <div class="input-group input-group-lg">
                <input
                  type="password"
                  class="form-control"
                  name="new_password"
                  id="newPassword"
                  placeholder="Enter new password"
                  required
                  autocomplete="off"
                  minlength="6"
                >
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword')">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="form-text">Password must be at least 6 characters long</div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="fas fa-key me-2 text-primary"></i>Confirm New Password
              </label>
              <div class="input-group input-group-lg">
                <input
                  type="password"
                  class="form-control"
                  name="confirm_password"
                  id="confirmPassword"
                  placeholder="Confirm new password"
                  required
                  autocomplete="off"
                  minlength="6"
                >
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword')">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success btn-lg">
                <i class="fas fa-check me-2"></i>Reset Password
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function togglePassword(inputId) {
  const input = document.getElementById(inputId);
  const icon = event.currentTarget.querySelector('i');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

function validateForm() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword.length < 6) {
    showNotification('Password must be at least 6 characters', 'warning');
    return false;
  }

  if (newPassword !== confirmPassword) {
    showNotification('Passwords do not match', 'warning');
    return false;
  }

  showNotification('Resetting password...', 'info');
  return true;
}
</script>
{% endblock %}
