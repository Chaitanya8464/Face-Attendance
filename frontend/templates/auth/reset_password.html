{% extends 'base.html' %}

{% block title %}Reset Password - Face Attendance System{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg animated">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fas fa-lock fa-4x mb-3" style="color: var(--primary-color);"></i>
            <h2 class="fw-bold">Reset Password</h2>
            <p class="text-muted">Hi {{ username }}! Enter your new password.</p>
          </div>

          {% if error %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}

          <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="mb-3">
              <label for="password" class="form-label">New Password</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fas fa-lock"></i>
                </span>
                <input type="password" class="form-control" id="password" name="password" required minlength="6" autofocus>
              </div>
              <small class="text-muted">At least 6 characters</small>
            </div>

            <div class="mb-4">
              <label for="confirm_password" class="form-label">Confirm New Password</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fas fa-lock"></i>
                </span>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
              <i class="fas fa-check me-2"></i> Reset Password
            </button>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <a href="{{ url_for('login') }}" class="text-muted">
              <i class="fas fa-arrow-left me-2"></i> Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
